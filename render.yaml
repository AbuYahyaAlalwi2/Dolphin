services:
  - type: worker
    name: dolphin-agent
    env: python
    buildCommand: "pip install -r requirements.txt && playwright install chromium"
    startCommand: "python agent_bot.py"
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
